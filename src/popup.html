<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>better spacehey config.</title>
        <style>
            main {
                padding: 0 1rem;
                background-color: aliceblue;
                width: 200px;
                height: 200px;
                position: relative;
            }
            p.title {
                background-color: #094cd3;
                padding: 1rem;
                color: white;
            }
            ul {
                list-style: none;
                padding: 0;
            }
            li {
                padding: 0;
            }
            .grayish {
                color: gray;
            }
            small.grayish {
                position: absolute;
                bottom: 0;
                right: 0;
            }
        </style>
    </head>
    <body>
        <p class="title">
            <b>better spacehey</b>
            <br />
            config
        </p>
        <main>
            <ul>
                <li>
                    <p title="allows bypassing the 150 messages limit">
                        <label for="im-messages">store im messages</label>
                        <input
                            type="checkbox"
                            name="im-messages"
                            id="im-messages"
                        />
                    </p>
                </li>
                <li>
                    <p title="saves your ten last sent messages">
                        <label for="im-toggle">im redo messages</label>
                        <input
                            type="checkbox"
                            name="im-toggle"
                            id="im-toggle"
                        />
                    </p>
                </li>
                <li title="stores drafts from in-progress blogs">
                    <p>
                        <label for="auto-save">auto-save blogs</label>
                        <input
                            type="checkbox"
                            name="auto-save"
                            id="auto-save"
                        />
                    </p>
                </li>
                <li>
                    <p class="grayish"><i>more coming soon!</i></p>
                </li>
            </ul>
            <small class="grayish">v1.04.1</small>
        </main>
        <script src="scripts/browser-polyfill.min.js"></script>
        <script src="scripts/popup.js"></script>
    </body>
</html>
